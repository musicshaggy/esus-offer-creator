<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESUS – start</title>

  <style>
    :root{
      /* ✅ jeden punkt zmiany brandu */
      --esus-bg: #0b1020;
      --esus-blue: #2F6BFF;
      --esus-white: rgba(255,255,255,.95);
    }

	html, body {
	  width: 100%;
	  height: 100%;
	  overflow: hidden;
	}
	

    body{
      margin:0;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(1200px 500px at 20% 10%, rgba(255,255,255,.06), transparent 55%),
        radial-gradient(900px 450px at 80% 90%, rgba(255,255,255,.04), transparent 60%),
        var(--esus-bg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* ✅ fade-out całego splasha */
    .splash-root{
      opacity: 1;
      transform: translateY(0);
      transition: opacity 280ms ease, transform 280ms ease;
    }
    .splash-root.fade-out{
      opacity: 0;
      transform: translateY(6px);
    }

    .splash{
      width: 440px;
      height: 240px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(10,12,18,.55);
      box-shadow: 0 30px 90px rgba(0,0,0,.55);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .splash::before{
      content:"";
      position:absolute;
      inset:-40%;
      background: radial-gradient(circle at center, rgba(255,255,255,.08), transparent 60%);
      opacity:.6;
      pointer-events:none;
    }

    .logo{
      width: 72px;
      height: 72px;
      filter:
        drop-shadow(0 0 10px rgba(255,255,255,.22))
        drop-shadow(0 0 28px color-mix(in srgb, var(--esus-blue) 55%, transparent));
      animation: spin 3.2s cubic-bezier(.6,0,.4,1) infinite;
    }

    @keyframes spin{
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .text{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
    }

    .title{
      font-weight: 750;
      letter-spacing: .02em;
      color: var(--esus-white);
    }

    .subtitle{
      font-size: 13px;
      opacity: .72;
      letter-spacing: .01em;
      color: rgba(255,255,255,.85);
    }
  </style>
</head>

<body>
  <div class="splash-root" id="splashRoot">
    <div class="splash">
      <img src="./assets/favicon.ico" alt="ESUS" class="logo" draggable="false" />
      <div class="text">
        <div class="title">Ładowanie aplikacji…</div>
        <div class="subtitle">Inicjalizacja środowiska ESUS</div>
      </div>
    </div>
  </div>

  <script>
    // wywołamy to z main.js tuż przed zamknięciem splasha
    window.__esusSplashFadeOut = () => {
      const el = document.getElementById('splashRoot');
      if (!el) return;
      el.classList.add('fade-out');
    };
  </script>
</body>
</html>
